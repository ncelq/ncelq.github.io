function avg(arr) {

}

/** Mini OHLC + SuperTrend candle chart SVG */
function ohlcChartHtml(symbol) {
  const entry = OHLC[symbol];
  const bars = Array.isArray(entry) ? entry : (entry && entry.bars);
  if (!Array.isArray(bars) || bars.length < 2) return "";
  const stUp = (!Array.isArray(entry) && entry.st_up) || [];
  const stDown = (!Array.isArray(entry) && entry.st_down) || [];
  const w = 300, h = 200, padX = 2, padY = 8; // 3:2
  let lo = Infinity, hi = -Infinity;
  bars.forEach((b, i) => {
    if (!b || b.length < 4) return;
    lo = Math.min(lo, b[2]);
    hi = Math.max(hi, b[1]);
    const u = stUp[i], d = stDown[i];
    if (u != null && !isNaN(u)) { lo = Math.min(lo, u); hi = Math.max(hi, u); }
    if (d != null && !isNaN(d)) { lo = Math.min(lo, d); hi = Math.max(hi, d); }
  });
  if (!(hi > lo)) return "";
  const n = bars.length;
  const slot = (w - padX * 2) / n;
  const bodyW = Math.max(1.5, Math.min(6, slot * 0.55));
  const yScale = (v) => padY + (hi - v) / (hi - lo) * (h - padY * 2);
  const upC = "#2ecc71", downC = "#e74c3c";
  const stFillUp = "#a8e6c1", stFillDown = "#f5b4b0";
  const stUpC = "#8fd9a8", stDownC = "#f0a0a0";

  function stFill(stArr, boundIdx, color) {
    let html = "";
    let i = 0;
    while (i < n) {
      while (i < n && (stArr[i] == null || isNaN(stArr[i]))) i++;
      if (i >= n) break;
      const start = i;
      while (i < n && stArr[i] != null && !isNaN(stArr[i])) i++;
      const end = i;
      let d = "";
      for (let j = start; j < end; j++) {
        const x = padX + j * slot + slot / 2;
        d += (j === start ? "M" : "L") + ` ${x.toFixed(1)} ${yScale(stArr[j]).toFixed(1)} `;
      }
      for (let j = end - 1; j >= start; j--) {
        const b = bars[j];
        if (!b) continue;
        const x = padX + j * slot + slot / 2;
        d += `L ${x.toFixed(1)} ${yScale(b[boundIdx]).toFixed(1)} `;
      }
      d += "Z";
      html += `<path d="${d}" fill="${color}" fill-opacity="0.15"/>`;
    }
    return html;
  }

  function stLine(stArr, color) {
    let html = "", seg = "";
    const flush = () => {
      if (seg) {
        html += `<polyline points="${seg.trim()}" fill="none" stroke="${color}" stroke-width="1.2"/>`;
        seg = "";
      }
    };
    for (let i = 0; i < n; i++) {
      const v = stArr[i];
      if (v == null || isNaN(v)) { flush(); continue; }
      const x = padX + i * slot + slot / 2;
      seg += `${x.toFixed(1)},${yScale(v).toFixed(1)} `;
    }
    flush();
    return html;
  }

  let parts = "";
  parts += stFill(stUp, 2, stFillUp);
  parts += stFill(stDown, 1, stFillDown);
  parts += stLine(stUp, stUpC);
  parts += stLine(stDown, stDownC);

  bars.forEach((b, i) => {
    if (!b || b.length < 4) return;
    const [o, high, low, c] = b.map(Number);
    if ([o, high, low, c].some(x => isNaN(x))) return;
    const x = padX + i * slot + slot / 2;
    const color = c >= o ? upC : downC;
    const yH = yScale(high), yL = yScale(low);
    const yO = yScale(o), yC = yScale(c);
    const top = Math.min(yO, yC), bot = Math.max(yO, yC);
    const bodyH = Math.max(1, bot - top);
    parts += `<line x1="${x.toFixed(1)}" y1="${yH.toFixed(1)}" x2="${x.toFixed(1)}" y2="${yL.toFixed(1)}" stroke="${color}" stroke-width="1"/>`;
    parts += `<rect x="${(x - bodyW / 2).toFixed(1)}" y="${top.toFixed(1)}" width="${bodyW.toFixed(1)}" height="${bodyH.toFixed(1)}" fill="${color}"/>`;
  });
  return `<div class="mini-chart" title="Last ${n} sessions OHLC + SuperTrend"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true">${parts}</svg></div>`;
}

function chainsOf(g) {
  const set = new Set();
  (g.industrial_leaves || []).forEach(l => {
    if (l && l.chain_name) set.add(l.chain_name);
  });
  return [...set];
}
function leavesOf(g, theme) {
  const leaves = g.industrial_leaves || [];
  const names = [];
  const seen = new Set();
  leaves.forEach(l => {
    if (!l || !l.name || seen.has(l.name)) return;
    if (theme && l.chain_name !== theme) return;
    seen.add(l.name);
    names.push(l.name);
  });
  return names;
}

function normThemeKey(s) {
  return String(s || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
}

/** Map overview/LLM title → exact Hot Theme Today chain_name when possible. */
function resolveHighlightTitle(rawTitle) {
  const names = themeStats.map(t => t.name);
  const target = normThemeKey(rawTitle);
  if (!target || !names.length) return String(rawTitle || "").trim();
  const exact = names.find(n => normThemeKey(n) === target);
  if (exact) return exact;
  const core = target.replace(/\s*\(.*$/, "").trim();
  const coreHit = names.find(n => normThemeKey(n) === core);
  if (coreHit) return coreHit;
  const scored = names.map(n => {
    const nn = normThemeKey(n);
    let score = 0;
    if (core && (core.startsWith(nn) || nn.startsWith(core))) score += 4;
    if (core && (core.includes(nn) || nn.includes(core))) score += 2;
    const ta = new Set(core.split(/\s+/).filter(Boolean));
    const tb = new Set(nn.split(/\s+/).filter(Boolean));
    let overlap = 0;
    ta.forEach(tok => { if (tb.has(tok)) overlap++; });
    score += overlap * 2;
    // Prefer longer theme names on ties (more specific)
    return { n, score, len: nn.length };
  }).filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score || b.len - a.len);
  return scored.length ? scored[0].n : String(rawTitle || "").trim();
}

  if (!lines.length) return "";
  const items = lines.map(l => {
    const text = l.replace(/^[•\-\*\u2013\u2014]\s*/, "").replace(/^\d+[.)]\s*/, "");
    return `<li>${esc(text)}</li>`;
  }).join("");
  return `<ul class="rational-points">${items}</ul>`;
}

function renderRationalBlock(g) {
  const rat = (g.rational || "").trim();
  const points = (g.rational_points || "").trim();
  const open = !!spotlightExpanded[g.symbol];
  const usablePoints = points && !points.startsWith("(");

  if (!rat && !usablePoints) {
    return `<div class="rational muted">No narrative available.</div>`;
  }

  if (usablePoints) {
    const ptsHtml = pointsToHtml(points);
    if (!rat) return ptsHtml;
    if (open) {
      return `${ptsHtml}<div class="rational-full">${esc(rat)}</div>
        <button type="button" class="more" data-sym="${esc(g.symbol)}">Show less</button>`;
    }
    return `${ptsHtml}<button type="button" class="more" data-sym="${esc(g.symbol)}">Read more</button>`;
  }

  // Fallback when points missing: truncated rational + Read more
  if (open || rat.length <= 220) {
    return `<div class="rational">${esc(rat)}${rat.length > 220 ? ` <button type="button" class="more" data-sym="${esc(g.symbol)}">Show less</button>` : ""}</div>`;
  }
  return `<div class="rational">${esc(truncate(rat, 220))} <button type="button" class="more" data-sym="${esc(g.symbol)}">Read more</button></div>`;
}

function renderSpotlight() {
  const sec = document.createElement("section");
  sec.className = "section";
  sec.id = "spotlight";
  const theme = themeStats.find(t => t.name === activeTheme);
  const title = theme ? theme.name : "All gainers";
  const list = (theme ? theme.list : G.slice()).slice().sort((a, b) => (b.change_pct || 0) - (a.change_pct || 0));
  const avgChg = avg(list.map(g => g.change_pct || 0));

  const wrap = document.createElement("div");
  wrap.className = "spotlight";
  wrap.innerHTML = `
    <div class="spotlight-hd">
      <h3>Hot Theme Breakdown · ${esc(title)}</h3>
      <div class="meta">${list.length} names · avg <span class="pos">${fmtPct(avgChg)}</span></div>
    </div>`;

  const grid = document.createElement("div");
  grid.className = "spot-grid";

  if (!list.length) {
    grid.innerHTML = `<p class="rational muted">No gainers in this theme.</p>`;
  } else {
    list.forEach((g, i) => {
      const card = document.createElement("article");
      card.className = "spot-card";
      card.style.animationDelay = (i * 0.03) + "s";
      const leaves = leavesOf(g, activeTheme);
      const leafHtml = leaves.slice(0, 6).map(n => `<span class="leaf-tag">${esc(n)}</span>`).join("");
      card.innerHTML = `
        <div class="top">
          <div>
            <div class="sym">${esc(g.symbol)}</div>
            <div class="nm">${esc(g.name)}</div>
          </div>
          <div class="chg">${fmtPct(g.change_pct)}</div>
        </div>
        <div class="row-meta">
          <span>${fmtPrice(g.price)}</span>
          ${fundBadgeHtml(g.fundamental)}
          ${scoreBadgeHtml(g.score_10d)}
        </div>
        ${ohlcChartHtml(g.symbol)}
        ${leafHtml ? `<div class="leaf-tags">${leafHtml}</div>` : ""}
        ${renderRationalBlock(g)}`;
      grid.appendChild(card);
    });
  }
  wrap.appendChild(grid);
  sec.appendChild(wrap);

  setTimeout(() => {
    wrap.querySelectorAll(".more").forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const sym = btn.dataset.sym;
        spotlightExpanded[sym] = !spotlightExpanded[sym];
        const y = window.scrollY;
        render();
        window.scrollTo(0, y);
      };
    });
  }, 0);
  return sec;
}

function renderFooter() {
  const f = document.createElement("footer");
  f.innerHTML = `Embedded from <code>${esc(SOURCE_FILE)}</code> · scraped ${esc(DATA.scraped_at || "—")} · standalone dashboard`;
  return f;
}

render();
</script>
</body>
</html>
