<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gainer Stories · Jul 23, 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --sand: #F2E2BA;
  --bg: #F0EFEC;
  --panel: #FBFAF8;
  --ink: #3C3A36;
  --muted: #78746C;
  --line: #D8D4CE;
  --accent: #A08060;
  --accent-deep: #8A7358;
  --font: "Source Sans 3", system-ui, sans-serif;
  --display: "Fraunces", Georgia, serif;
  --nav-h: 52px;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
}
.nav {
  position: sticky; top: 0; z-index: 20;
  height: var(--nav-h);
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px;
  background:
    linear-gradient(180deg, #FBFAF8 0%, #F7F1E4 100%);
  border-bottom: 1px solid var(--line);
}
.brand {
  font-family: var(--display);
  font-weight: 700; font-size: 15px;
  letter-spacing: -0.02em;
  white-space: nowrap;
  margin-right: 4px;
}
.nav-btn {
  appearance: none; border: 1px solid var(--line);
  background: var(--panel); color: var(--ink);
  border-radius: 8px; height: 32px; min-width: 32px;
  padding: 0 10px; cursor: pointer;
  font: inherit; font-size: 13px; font-weight: 600;
}
.nav-btn:hover:not(:disabled) { border-color: var(--accent); }
.nav-btn:disabled { opacity: .35; cursor: default; }
.dates {
  display: flex; align-items: center; gap: 6px;
  overflow-x: auto; flex: 1; min-width: 0;
  scrollbar-width: none;
}
.dates::-webkit-scrollbar { display: none; }
.date-chip {
  appearance: none; border: 1px solid transparent;
  background: transparent; color: var(--muted);
  border-radius: 999px; height: 30px;
  padding: 0 12px; cursor: pointer;
  font: inherit; font-size: 13px; font-weight: 600;
  white-space: nowrap;
}
.date-chip:hover { color: var(--ink); background: rgba(160,128,96,.08); }
.date-chip.active {
  color: var(--accent-deep);
  background: rgba(242,226,186,.55);
  border-color: var(--sand);
}
.empty {
  display: grid; place-items: center; height: calc(100% - var(--nav-h));
  color: var(--muted); margin: 0; font-size: 15px;
}
#frame {
  display: block; width: 100%;
  height: calc(100% - var(--nav-h));
  border: 0; background: var(--bg);
}
</style>
</head>
<body>
<header class="nav" aria-label="Dashboard navigation">
  <span class="brand">Gainer Stories</span>
  <button type="button" class="nav-btn" id="prev" aria-label="Older dashboard" title="Older">←</button>
  <button type="button" class="nav-btn" id="next" aria-label="Newer dashboard" title="Newer">→</button>
  <div class="dates" id="dates" role="tablist" aria-label="Recent dates"></div>
</header>
<iframe id="frame" title="Dashboard" src="20260723_dashboard.html"></iframe>
<p class="empty" id="empty" hidden>No dashboards yet. Run export to create one.</p>
<script>
const DASHBOARDS = [{"file": "20260723_dashboard.html", "date": "20260723", "label": "Jul 23, 2026"}, {"file": "20260722_dashboard.html", "date": "20260722", "label": "Jul 22, 2026"}, {"file": "20260721_dashboard.html", "date": "20260721", "label": "Jul 21, 2026"}];
let idx = 0;

const frame = document.getElementById("frame");
const datesEl = document.getElementById("dates");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");
const emptyEl = document.getElementById("empty");

function show(i) {
  if (!DASHBOARDS.length) return;
  idx = Math.max(0, Math.min(DASHBOARDS.length - 1, i));
  const d = DASHBOARDS[idx];
  frame.src = d.file;
  document.title = "Gainer Stories · " + d.label;
  prevBtn.disabled = idx >= DASHBOARDS.length - 1;
  nextBtn.disabled = idx <= 0;
  datesEl.querySelectorAll(".date-chip").forEach((el, j) => {
    el.classList.toggle("active", j === idx);
    el.setAttribute("aria-selected", j === idx ? "true" : "false");
  });
}

function init() {
  if (!DASHBOARDS.length) {
    frame.hidden = true;
    emptyEl.hidden = false;
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    return;
  }
  DASHBOARDS.forEach((d, i) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "date-chip" + (i === 0 ? " active" : "");
    btn.textContent = d.label;
    btn.setAttribute("role", "tab");
    btn.setAttribute("aria-selected", i === 0 ? "true" : "false");
    btn.addEventListener("click", () => show(i));
    datesEl.appendChild(btn);
  });
  // Newer = lower index (list is newest-first); Older = higher index
  prevBtn.addEventListener("click", () => show(idx + 1));
  nextBtn.addEventListener("click", () => show(idx - 1));
  show(0);
}

init();
</script>
</body>
</html>
