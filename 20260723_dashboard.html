    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function avg(arr) {
  if (!arr.length) return 0;
  return arr.reduce((a, b) => a + b, 0) / arr.length;
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return "—";
  const v = Number(n);

}
function fmtPrice(p) {
  if (p == null || p === "") return "—";
  const n = Number(p);
  if (isNaN(n)) return esc(p);
  return "$" + n.toFixed(2);
}

}

/** Mini OHLC + SuperTrend candle chart SVG */
function ohlcChartHtml(symbol) {
  const entry = OHLC[symbol];
  const bars = Array.isArray(entry) ? entry : (entry && entry.bars);
  if (!Array.isArray(bars) || bars.length < 2) return "";
  const stUp = (!Array.isArray(entry) && entry.st_up) || [];
  const stDown = (!Array.isArray(entry) && entry.st_down) || [];
  const w = 300, h = 200, padX = 2, padY = 8; // 3:2
  let lo = Infinity, hi = -Infinity;
  bars.forEach((b, i) => {
    if (!b || b.length < 4) return;
    lo = Math.min(lo, b[2]);
    hi = Math.max(hi, b[1]);
    const u = stUp[i], d = stDown[i];
    if (u != null && !isNaN(u)) { lo = Math.min(lo, u); hi = Math.max(hi, u); }
    if (d != null && !isNaN(d)) { lo = Math.min(lo, d); hi = Math.max(hi, d); }
  });
  if (!(hi > lo)) return "";
  const n = bars.length;
  const slot = (w - padX * 2) / n;
  const bodyW = Math.max(1.5, Math.min(6, slot * 0.55));
  const yScale = (v) => padY + (hi - v) / (hi - lo) * (h - padY * 2);
  const upC = "#2ecc71", downC = "#e74c3c";
  const stFillUp = "#a8e6c1", stFillDown = "#f5b4b0";
  const stUpC = "#8fd9a8", stDownC = "#f0a0a0";

  function stFill(stArr, boundIdx, color) {
    let html = "";
    let i = 0;
    while (i < n) {
      while (i < n && (stArr[i] == null || isNaN(stArr[i]))) i++;
      if (i >= n) break;
      const start = i;
      while (i < n && stArr[i] != null && !isNaN(stArr[i])) i++;
      const end = i;
      let d = "";
      for (let j = start; j < end; j++) {
        const x = padX + j * slot + slot / 2;
        d += (j === start ? "M" : "L") + ` ${x.toFixed(1)} ${yScale(stArr[j]).toFixed(1)} `;
      }
      for (let j = end - 1; j >= start; j--) {
        const b = bars[j];
        if (!b) continue;
        const x = padX + j * slot + slot / 2;
        d += `L ${x.toFixed(1)} ${yScale(b[boundIdx]).toFixed(1)} `;
      }
      d += "Z";
      html += `<path d="${d}" fill="${color}" fill-opacity="0.15"/>`;
    }
    return html;
  }

  function stLine(stArr, color) {
    let html = "", seg = "";
    const flush = () => {
      if (seg) {
        html += `<polyline points="${seg.trim()}" fill="none" stroke="${color}" stroke-width="1.2"/>`;
        seg = "";
      }
    };
    for (let i = 0; i < n; i++) {
      const v = stArr[i];
      if (v == null || isNaN(v)) { flush(); continue; }
      const x = padX + i * slot + slot / 2;
      seg += `${x.toFixed(1)},${yScale(v).toFixed(1)} `;
    }
    flush();
    return html;
  }

  let parts = "";
  parts += stFill(stUp, 2, stFillUp);
  parts += stFill(stDown, 1, stFillDown);
  parts += stLine(stUp, stUpC);
  parts += stLine(stDown, stDownC);

  bars.forEach((b, i) => {
    if (!b || b.length < 4) return;
    const [o, high, low, c] = b.map(Number);
    if ([o, high, low, c].some(x => isNaN(x))) return;
    const x = padX + i * slot + slot / 2;
    const color = c >= o ? upC : downC;
    const yH = yScale(high), yL = yScale(low);
    const yO = yScale(o), yC = yScale(c);
    const top = Math.min(yO, yC), bot = Math.max(yO, yC);
    const bodyH = Math.max(1, bot - top);
    parts += `<line x1="${x.toFixed(1)}" y1="${yH.toFixed(1)}" x2="${x.toFixed(1)}" y2="${yL.toFixed(1)}" stroke="${color}" stroke-width="1"/>`;
    parts += `<rect x="${(x - bodyW / 2).toFixed(1)}" y="${top.toFixed(1)}" width="${bodyW.toFixed(1)}" height="${bodyH.toFixed(1)}" fill="${color}"/>`;
  });
  return `<div class="mini-chart" title="Last ${n} sessions OHLC + SuperTrend"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true">${parts}</svg></div>`;
}

function chainsOf(g) {
  const set = new Set();
  (g.industrial_leaves || []).forEach(l => {

  return [...set];
}
function leavesOf(g, theme) {
  const leaves = g.industrial_leaves || [];

  leaves.forEach(l => {
    if (!l || !l.name || seen.has(l.name)) return;
    if (theme && l.chain_name !== theme) return;
    seen.add(l.name);
    names.push(l.name);
  });
  return names;
}

}

  app.innerHTML = "";
  app.appendChild(renderHero());
  app.appendChild(renderThemes());
  app.appendChild(renderSpotlight());
  app.appendChild(renderQuality());
  app.appendChild(renderFooter());
}

function renderHero() {
  const el = document.createElement("header");
  el.className = "hero";
  const scraped = DATA.scraped_at || "—";
  const minPct = DATA.min_change_pct != null ? DATA.min_change_pct : 5;
  const update = (DATA.market_update || "").trim();
  const overviewRaw = DATA.theme_overview;
  const overviewObj = (overviewRaw && typeof overviewRaw === "object")
    ? overviewRaw
    : { text: typeof overviewRaw === "string" ? overviewRaw : "", themes: [] };
  const overviewText = String(overviewObj.text || "").trim();
  const overviewThemes = Array.isArray(overviewObj.themes) ? overviewObj.themes : [];
  const sections = [];
  if (update && !update.startsWith("(")) {
    sections.push(`<div class="brief-section">
      <div class="sym">Market update</div>${pointsToHtml(update)}
    </div>`);
  }
  const highlightInner = renderHotThemeHighlights(overviewThemes, overviewText);
  if (highlightInner) {
    sections.push(`<div class="brief-section">${highlightInner}</div>`);
  }
  const briefHtml = sections.length
    ? `<div class="index-briefs"><div class="index-brief">${sections.join("")}</div></div>`
    : "";
  el.innerHTML = `
    <p class="eyebrow">Top gainers · theme-first</p>
    <h1>Today's Hot Theme (20260723)</h1>
    <div class="hero-meta">
      <span><strong>${G.length}</strong> gainers</span>
      <span class="sep">·</span>
      <span><strong>${themeStats.length}</strong> themes</span>
      <span class="sep">·</span>
      <span>Top theme: <strong>${esc(topTheme ? topTheme.name : "—")}</strong></span>
      <span class="sep">·</span>
      <span>Scraped ${esc(scraped)} · ≥ ${minPct}%</span>
    </div>
    ${briefHtml}`;
  return el;
}

function normThemeKey(s) {
  return String(s || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
}

/** Map overview/LLM title → exact Hot Theme Today chain_name when possible. */
function resolveHighlightTitle(rawTitle) {
  const names = themeStats.map(t => t.name);
  const target = normThemeKey(rawTitle);
  if (!target || !names.length) return String(rawTitle || "").trim();
  const exact = names.find(n => normThemeKey(n) === target);
  if (exact) return exact;
  const core = target.replace(/\s*\(.*$/, "").trim();
  const coreHit = names.find(n => normThemeKey(n) === core);
  if (coreHit) return coreHit;
  const scored = names.map(n => {
    const nn = normThemeKey(n);
    let score = 0;
    if (core && (core.startsWith(nn) || nn.startsWith(core))) score += 4;
    if (core && (core.includes(nn) || nn.includes(core))) score += 2;
    const ta = new Set(core.split(/\s+/).filter(Boolean));
    const tb = new Set(nn.split(/\s+/).filter(Boolean));
    let overlap = 0;
    ta.forEach(tok => { if (tb.has(tok)) overlap++; });
    score += overlap * 2;
    // Prefer longer theme names on ties (more specific)
    return { n, score, len: nn.length };
  }).filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score || b.len - a.len);
  return scored.length ? scored[0].n : String(rawTitle || "").trim();
}

function renderHotThemeHighlights(themes, fallbackText) {
  const usableThemes = (themes || []).filter(t => t && String(t.title || "").trim());
  if (usableThemes.length) {
    const cards = usableThemes.map(t => {
      const title = resolveHighlightTitle(t.title);
      const tickers = Array.isArray(t.tickers) ? t.tickers : [];
      const bullets = Array.isArray(t.bullets) ? t.bullets : [];
      const takeaway = String(t.takeaway || "").trim();
      const tickerHtml = tickers.length
        ? `<div class="h-tickers">${tickers.map(x => `<span class="h-ticker">${esc(String(x))}</span>`).join("")}</div>`
        : "";
      const bulletHtml = bullets.length
        ? `<ul class="h-bullets">${bullets.map(b => `<li>${esc(String(b))}</li>`).join("")}</ul>`
        : "";
      const takeHtml = takeaway ? `<div class="h-takeaway">${esc(takeaway)}</div>` : "";
      return `<article class="highlight-card">
        <h3 class="h-title">${esc(title)}</h3>
        ${tickerHtml}${bulletHtml}${takeHtml}
      </article>`;
    }).join("");
    return `<div class="sym">Hot Theme Highlights</div>
      <div class="highlight-grid">${cards}</div>`;
  }
  const text = String(fallbackText || "").trim();
  if (text && !text.startsWith("(")) {
    return `<div class="sym">Hot Theme Highlights</div>
      <pre class="theme-overview">${esc(text)}</pre>`;
  }
  return "";
}

function renderThemes() {
  const sec = document.createElement("section");
  sec.className = "section";
  sec.id = "themes";
  sec.innerHTML = `
    <div class="section-hd">
      <h2>Hot Theme Today</h2>
    </div>`;
  const grid = document.createElement("div");
  grid.className = "theme-grid";
  const catalystsMap = DATA.theme_catalysts || {};
  themeStats.forEach(t => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "theme-board" + (t.name === activeTheme ? " active" : "");
    const leafList = t.leaves || [];
    const preview = leafList.slice(0, 4).map(n => `<span class="leaf-chip">${esc(n)}</span>`).join("");
    const extra = leafList.length > 4 ? `<span class="leaf-chip">+${leafList.length - 4}</span>` : "";
    const catHtml = pointsToHtml(catalystsMap[t.name] || "");
    const catBlock = catHtml
      ? `<div class="theme-catalysts"><div class="cat-label">Key catalysts</div>${catHtml}</div>`
      : "";
    btn.innerHTML = `
      <div class="t-name">${esc(t.name)}</div>
      <div class="t-stats">
        <span>${t.syms.length} name${t.syms.length === 1 ? "" : "s"}</span>
        <span class="t-avg">${fmtPct(t.avgChg)}</span>
      </div>
      ${catBlock}
      <div class="t-leaves">${preview}${extra}</div>`;
    btn.onclick = () => {
      if (activeTheme === t.name) {
        activeTheme = null;
      } else {
        activeTheme = t.name;
      }
      spotlightExpanded = {};
      const y = window.scrollY;
      render();
      window.scrollTo(0, y);
    };
    grid.appendChild(btn);
  });
  sec.appendChild(grid);
  return sec;
}


function fundNum(f) {
  if (f == null || f === "" || isNaN(Number(f))) return 0;
  return Number(f);
}

function isQualityPick(g) {
  const fund = fundNum(g.fundamental);
  const score = g.score_10d;
  const scoreOk = score != null && !isNaN(Number(score)) && Number(score) >= 75;
  return fund >= 4 || scoreOk;
}

function renderQuality() {
  const sec = document.createElement("section");
  sec.className = "section";
  sec.id = "quality";
  const list = G.filter(isQualityPick)
    .slice()
    .sort((a, b) => (b.change_pct || 0) - (a.change_pct || 0));

  sec.innerHTML = `
    <div class="section-hd">
      <h2>Quality screen</h2>
      <p>Fund ≥ 4 or 10d score ≥ 75 — compact cards, no narratives.</p>
    </div>`;

  const wrap = document.createElement("div");
  wrap.className = "spotlight";
  const meta = document.createElement("div");
  meta.className = "spotlight-hd";
  meta.innerHTML = `
    <h3>${list.length} name${list.length === 1 ? "" : "s"}</h3>
    <div class="meta">sorted by change</div>`;
  wrap.appendChild(meta);

  const grid = document.createElement("div");
  grid.className = "spot-grid";

  if (!list.length) {
    grid.innerHTML = `<p class="rational muted">No gainers meet Fund ≥ 4 or 10d ≥ 75 today.</p>`;
  } else {
    list.forEach((g, i) => {
      const card = document.createElement("article");
      card.className = "spot-card";
      card.style.animationDelay = (i * 0.03) + "s";
      const themes = chainsOf(g);
      const themeHtml = themes.slice(0, 4).map(t => `<span class="leaf-tag">${esc(t)}</span>`).join("");
      card.innerHTML = `
        <div class="top">
          <div>
            <div class="sym">${esc(g.symbol)}</div>
            <div class="nm">${esc(g.name)}</div>
          </div>
          <div class="chg">${fmtPct(g.change_pct)}</div>
        </div>
        <div class="row-meta">
          <span>${fmtPrice(g.price)}</span>
          ${fundBadgeHtml(g.fundamental)}
          ${scoreBadgeHtml(g.score_10d)}
        </div>
        ${ohlcChartHtml(g.symbol)}
        ${themeHtml ? `<div class="leaf-tags">${themeHtml}</div>` : ""}`;
      grid.appendChild(card);
    });
  }
  wrap.appendChild(grid);
  sec.appendChild(wrap);
  return sec;
}

function pointsToHtml(points) {
  const lines = String(points || "").split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  if (!lines.length) return "";
  const items = lines.map(l => {
    const text = l.replace(/^[•\-\*\u2013\u2014]\s*/, "").replace(/^\d+[.)]\s*/, "");
    return `<li>${esc(text)}</li>`;
  }).join("");
  return `<ul class="rational-points">${items}</ul>`;
}

function renderRationalBlock(g) {
  const rat = (g.rational || "").trim();
  const points = (g.rational_points || "").trim();
  const open = !!spotlightExpanded[g.symbol];
  const usablePoints = points && !points.startsWith("(");

  if (!rat && !usablePoints) {
    return `<div class="rational muted">No narrative available.</div>`;
  }

  if (usablePoints) {
    const ptsHtml = pointsToHtml(points);
    if (!rat) return ptsHtml;
    if (open) {
      return `${ptsHtml}<div class="rational-full">${esc(rat)}</div>
        <button type="button" class="more" data-sym="${esc(g.symbol)}">Show less</button>`;
    }
    return `${ptsHtml}<button type="button" class="more" data-sym="${esc(g.symbol)}">Read more</button>`;
  }

  // Fallback when points missing: truncated rational + Read more
  if (open || rat.length <= 220) {
    return `<div class="rational">${esc(rat)}${rat.length > 220 ? ` <button type="button" class="more" data-sym="${esc(g.symbol)}">Show less</button>` : ""}</div>`;
  }
  return `<div class="rational">${esc(truncate(rat, 220))} <button type="button" class="more" data-sym="${esc(g.symbol)}">Read more</button></div>`;
}

function renderSpotlight() {
  const sec = document.createElement("section");
  sec.className = "section";
  sec.id = "spotlight";
  const theme = themeStats.find(t => t.name === activeTheme);
  const title = theme ? theme.name : "All gainers";
  const list = (theme ? theme.list : G.slice()).slice().sort((a, b) => (b.change_pct || 0) - (a.change_pct || 0));
  const avgChg = avg(list.map(g => g.change_pct || 0));

  const wrap = document.createElement("div");
  wrap.className = "spotlight";
  wrap.innerHTML = `
    <div class="spotlight-hd">
      <h3>Hot Theme Breakdown · ${esc(title)}</h3>
      <div class="meta">${list.length} names · avg <span class="pos">${fmtPct(avgChg)}</span></div>
    </div>`;

  const grid = document.createElement("div");
  grid.className = "spot-grid";

  if (!list.length) {
    grid.innerHTML = `<p class="rational muted">No gainers in this theme.</p>`;
  } else {
    list.forEach((g, i) => {
      const card = document.createElement("article");
      card.className = "spot-card";
      card.style.animationDelay = (i * 0.03) + "s";
      const leaves = leavesOf(g, activeTheme);
      const leafHtml = leaves.slice(0, 6).map(n => `<span class="leaf-tag">${esc(n)}</span>`).join("");
      card.innerHTML = `
        <div class="top">
          <div>
            <div class="sym">${esc(g.symbol)}</div>
            <div class="nm">${esc(g.name)}</div>
          </div>
          <div class="chg">${fmtPct(g.change_pct)}</div>
        </div>
        <div class="row-meta">
          <span>${fmtPrice(g.price)}</span>
          ${fundBadgeHtml(g.fundamental)}
          ${scoreBadgeHtml(g.score_10d)}
        </div>
        ${ohlcChartHtml(g.symbol)}
        ${leafHtml ? `<div class="leaf-tags">${leafHtml}</div>` : ""}
        ${renderRationalBlock(g)}`;
      grid.appendChild(card);
    });
  }
  wrap.appendChild(grid);
  sec.appendChild(wrap);

  setTimeout(() => {
    wrap.querySelectorAll(".more").forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const sym = btn.dataset.sym;
        spotlightExpanded[sym] = !spotlightExpanded[sym];
        const y = window.scrollY;
        render();
        window.scrollTo(0, y);
      };
    });
  }, 0);
  return sec;
}

function renderFooter() {
  const f = document.createElement("footer");
  f.innerHTML = `Embedded from <code>${esc(SOURCE_FILE)}</code> · scraped ${esc(DATA.scraped_at || "—")} · standalone dashboard`;
  return f;
}

render();
</script>
